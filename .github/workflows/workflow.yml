name: API Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'Web/Backend/**'  # changes in backend
      - 'SQL/**'  # changes in sql
      - '.github/workflows/workflow.yml'  # changes in workflow
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'Web/Backend/**'
      - 'SQL/**'
      - '.github/workflows/workflow.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:  # Oder mysql, mongodb, etc.
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python  # Oder Node.js, Java, etc.
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Cache Dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('Web/Backend/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Dependencies
      working-directory: ./Web/Backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Setup Database Schema
      env:
        PGPASSWORD: testpassword
      run: |
        psql -h localhost -U testuser -d testdb -f SQL/schema.sql

    - name: Run Tests
      working-directory: ./Web/Backend
      env:
        DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb
        TESTING: true
      run: |
        pytest tests/ --cov=. --cov-report=xml

    - name: Upload Coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false