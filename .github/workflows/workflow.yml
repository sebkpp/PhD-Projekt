name: API Tests

on:
  push:
    branches: [ main, development ]
    paths:
      - 'Web/Backend/**'
      - 'sql/**'
      - '.github/workflows/workflow.yml'
  pull_request:
    branches: [ main, development ]
    paths:
      - 'Web/Backend/**'
      - 'sql/**'
      - '.github/workflows/workflow.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v3

    - name: Install Dependencies
      working-directory: ./Web
      run: uv sync

    - name: Create .env.test
      working-directory: ./Web/Backend
      run: |
        printf 'DB_NAME=testdb\nDB_USER=testuser\nDB_PASSWORD=testpassword\nDB_HOST=localhost\nDB_PORT=5432\n' > .env.test

    - name: Setup Database Schema
      env:
        PGPASSWORD: testpassword
      run: |
        psql -h localhost -U testuser -d testdb -f sql/schema.sql

    - name: Run Tests
      working-directory: ./Web
      env:
        TESTING: "true"
      run: |
        uv run pytest Backend/tests/ --cov=Backend --cov-report=xml

    - name: Upload Coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./Web/coverage.xml
        fail_ci_if_error: false